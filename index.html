<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>
        <b>Color Changer Boxes</b>
    </h1>
    <div class="container">
    <button class="button" id="pink"></button>
    <button class="button" id="blue"></button>
    <button class="button" id="yellow"></button>
    <button class="button" id="red"></button>
    <button class="button" id="black"></button>
    <button class="button" id="violet"></button>
    <button class="button" id="green"></button>
    <button class="button" id="orange"></button>
    </div>
    <p>Tap on the given box to change the background Color same as the box</p>
</body>
<script src="script.js"></script>
</html>
